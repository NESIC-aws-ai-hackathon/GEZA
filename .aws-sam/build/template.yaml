AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GEZA - AI Apology Support Application
Globals:
  Function:
    Runtime: python3.13
    Architectures:
    - arm64
    Layers:
    - Ref: GezaSharedLayer
    Environment:
      Variables:
        DYNAMODB_TABLE_NAME:
          Ref: GezaDataTable
        SQS_QUEUE_URL:
          Ref: GezaAsyncJobsQueue
        PROMPTS_BUCKET_NAME:
          Fn::Sub: geza-prompts-${AWS::AccountId}-${AWS::Region}
        BEDROCK_REGION: ap-northeast-1
        ALLOWED_ORIGIN:
          Fn::Sub: https://${GezaDistribution.DomainName}
        COGNITO_USER_POOL_ID:
          Ref: GezaUserPool
    Tracing: PassThrough
Resources:
  GezaSharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: geza-shared
      Description: GEZA shared modules
      ContentUri: GezaSharedLayer
      CompatibleRuntimes:
      - python3.13
      CompatibleArchitectures:
      - arm64
      RetentionPolicy: Delete
    Metadata:
      BuildArchitecture: arm64
      BuildMethod: python3.13
      SamResourceId: GezaSharedLayer
  GezaDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: geza-data
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: pk
        AttributeType: S
      - AttributeName: sk
        AttributeType: S
      KeySchema:
      - AttributeName: pk
        KeyType: HASH
      - AttributeName: sk
        KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
  GezaAsyncJobsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: geza-async-jobs-dlq
      MessageRetentionPeriod: 1209600
  GezaAsyncJobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: geza-async-jobs
      VisibilityTimeout: 70
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - GezaAsyncJobsDlq
          - Arn
        maxReceiveCount: 3
  GezaStaticBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: geza-static-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  GezaPromptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: geza-prompts-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  GezaStaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: GezaStaticBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${GezaStaticBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${GezaDistribution}
  GezaPromptsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: GezaPromptsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${GezaPromptsBucket.Arn}/*
  GezaCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: geza-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  GezaResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: geza-security-headers
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: default-src 'self'; script-src 'self'; style-src
              'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.execute-api.ap-northeast-1.amazonaws.com
              https://cognito-idp.ap-northeast-1.amazonaws.com; font-src 'self'; frame-ancestors
              'none';
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          XSSProtection:
            Protection: true
            ModeBlock: true
            Override: true
  GezaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_200
        Origins:
        - Id: S3Origin
          DomainName:
            Fn::GetAtt:
            - GezaStaticBucket
            - RegionalDomainName
          OriginAccessControlId:
            Ref: GezaCloudFrontOAC
          S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ResponseHeadersPolicyId:
            Ref: GezaResponseHeadersPolicy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        CacheBehaviors:
        - PathPattern: index.html
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ResponseHeadersPolicyId:
            Ref: GezaResponseHeadersPolicy
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
        - PathPattern: '*.html'
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ResponseHeadersPolicyId:
            Ref: GezaResponseHeadersPolicy
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
        CustomErrorResponses:
        - ErrorCode: 403
          ResponseCode: 200
          ResponsePagePath: /index.html
          ErrorCachingMinTTL: 0
        - ErrorCode: 404
          ResponseCode: 200
          ResponsePagePath: /index.html
          ErrorCachingMinTTL: 0
        HttpVersion: http2
  GezaUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: geza-user-pool
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      MfaConfiguration: 'ON'
      EnabledMfas:
      - SOFTWARE_TOKEN_MFA
      Schema:
      - AttributeDataType: String
        Name: email
        Required: true
        Mutable: true
      AutoVerifiedAttributes:
      - email
      AccountRecoverySetting:
        RecoveryMechanisms:
        - Name: verified_email
          Priority: 1
      UserPoolAddOns:
        AdvancedSecurityMode: 'OFF'
  GezaUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId:
        Ref: GezaUserPool
      ClientName: geza-web-client
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_SRP_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_PASSWORD_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED
  GezaIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: geza-identity-pool
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
      - ClientId:
          Ref: GezaUserPoolClient
        ProviderName:
          Fn::GetAtt:
          - GezaUserPool
          - ProviderName
  GezaIdentityPoolAuthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: geza-identity-pool-auth-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated: cognito-identity.amazonaws.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              cognito-identity.amazonaws.com:aud:
                Ref: GezaIdentityPool
            ForAnyValue:StringLike:
              cognito-identity.amazonaws.com:amr: authenticated
      Policies:
      - PolicyName: geza-transcribe-policy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: transcribe:StartStreamTranscriptionWebSocket
            Resource: '*'
  GezaIdentityPoolRoles:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId:
        Ref: GezaIdentityPool
      Roles:
        authenticated:
          Fn::GetAtt:
          - GezaIdentityPoolAuthRole
          - Arn
  GezaHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer:
                Fn::Sub: https://cognito-idp.ap-northeast-1.amazonaws.com/${GezaUserPool}
              audience:
              - Ref: GezaUserPoolClient
      CorsConfiguration:
        AllowHeaders:
        - Authorization
        - Content-Type
        AllowMethods:
        - GET
        - POST
        - OPTIONS
        AllowOrigins:
        - Fn::Sub: https://${GezaDistribution.DomainName}
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 20
      AccessLogSettings:
        DestinationArn:
          Fn::GetAtt:
          - GezaApiAccessLogGroup
          - Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","responseLength":"$context.responseLength"}'
  GezaApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/geza-http-api
      RetentionInDays: 7
  AssessApologyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: assess-apology
      Handler: lambda_function.lambda_handler
      CodeUri: AssessApologyFunction
      MemorySize: 256
      Timeout: 10
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:Query
          Resource:
            Fn::GetAtt:
            - GezaDataTable
            - Arn
        - Effect: Allow
          Action: bedrock:InvokeModel
          Resource: arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.nova-lite-v1:0
        - Effect: Allow
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${GezaPromptsBucket.Arn}/*
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: GezaHttpApi
            Method: POST
            Path: /apology/assess
    Metadata:
      SamResourceId: AssessApologyFunction
