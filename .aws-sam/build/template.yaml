          Properties:
            ApiId:
              Ref: GezaHttpApi
            Method: POST
            Path: /sessions
    Metadata:
      SamResourceId: SaveSessionFunction
  GetKarteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-karte
      Handler: lambda_function.lambda_handler
