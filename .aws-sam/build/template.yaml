  BedrockDispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: bedrock-dispatcher
      Handler: lambda_function.lambda_handler
      CodeUri: BedrockDispatcherFunction
      MemorySize: 1024
      Timeout: 60
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - sqs:ReceiveMessage
          - sqs:DeleteMessage
          - sqs:GetQueueAttributes
          Resource:
            Fn::GetAtt:
            - GezaAsyncJobsQueue
            - Arn
        - Effect: Allow
          Action:
          - dynamodb:UpdateItem
          - dynamodb:PutItem
          Resource:
            Fn::GetAtt:
            - GezaDataTable
            - Arn
        - Effect: Allow
          Action: bedrock:InvokeModel
          Resource:
          - arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-sonnet-4-5-v1:0
          - arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-haiku-4-5-v1:0
        - Effect: Allow
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${GezaPromptsBucket.Arn}/*
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - GezaAsyncJobsQueue
              - Arn
            BatchSize: 1
            FunctionResponseTypes:
            - ReportBatchItemFailures
    Metadata:
      SamResourceId: BedrockDispatcherFunction
