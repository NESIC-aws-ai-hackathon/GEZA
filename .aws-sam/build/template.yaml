            ApiId:
              Ref: GezaHttpApi
            Method: GET
            Path: /karte
        ApiGet:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: GezaHttpApi
            Method: GET
            Path: /karte/{sessionId}
    Metadata:
      SamResourceId: GetKarteFunction
