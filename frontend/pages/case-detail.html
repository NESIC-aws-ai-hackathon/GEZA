<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>GEZA — 案件詳細</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon.png">
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ── レイアウト ── */
    .detail-wrap {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }
    /* ── アバター + 相手情報 ── */
    .case-hero {
      display: flex;
      gap: 14px;
      align-items: center;
      background: linear-gradient(135deg, rgba(83,52,131,0.12) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
    }
    .case-avatar-wrap {
      flex-shrink: 0;
    }
    .case-avatar-wrap .avatar-frame {
      width: 80px;
      height: 96px;
      border-radius: 12px;
    }
    .case-meta {
      flex: 1;
      min-width: 0;
    }
    .case-meta-title {
      font-size: 15px;
      font-weight: 700;
      color: #f0f0f0;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 6px;
    }
    .badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      color: #aaa;
      font-weight: 600;
    }
    .badge.anger { background: rgba(233,69,96,0.15); color: #e94560; }
    .badge.trust { background: rgba(46,204,113,0.12); color: #2ecc71; }
    .case-meta-summary {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* ── アクションボタン ── */
    .action-row {
      display: flex;
      gap: 8px;
    }
    .btn-action {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      color: #ccc;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-action:hover { border-color: #533483; background: rgba(83,52,131,0.15); color: #a78bfa; }
    .btn-action.rehearsal { border-color: rgba(124,58,237,0.4); color: #a78bfa; }
    .btn-action.rehearsal:hover { background: rgba(124,58,237,0.2); }
    .btn-action.delete { color: #777; }
    .btn-action.delete:hover { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.08); }

    /* ── タイムライン ── */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }
    .timeline-item {
      display: flex;
      gap: 12px;
      position: relative;
    }
    .timeline-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 24px;
      flex-shrink: 0;
    }
    .timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #533483;
      border: 2px solid #7c3aed;
      flex-shrink: 0;
      z-index: 1;
    }
    .timeline-dot.done { background: #2ecc71; border-color: #27ae60; }
    .timeline-dot.active { background: #7c3aed; border-color: #a78bfa; box-shadow: 0 0 8px rgba(124,58,237,0.5); }
    .timeline-line {
      flex: 1;
      width: 2px;
      background: rgba(255,255,255,0.08);
      min-height: 12px;
    }
    .timeline-content {
      flex: 1;
      min-width: 0;
      padding-bottom: 14px;
    }
    .timeline-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .timeline-label {
      font-size: 13px;
      font-weight: 700;
      color: #c4b5fd;
    }
    .timeline-time {
      font-size: 10px;
      color: #555;
      margin-left: auto;
    }
    .timeline-expand-icon {
      font-size: 10px;
      color: #666;
      transition: transform 0.2s;
    }
    .timeline-body {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.6;
    }
    .timeline-body.collapsed {
      display: none;
    }

    /* ── Todo セクション（タイムライン内） ── */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s;
    }
    .todo-item:hover { border-color: rgba(124,58,237,0.3); background: rgba(83,52,131,0.08); }
    .todo-item.done { opacity: 0.5; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #666; }
    .todo-checkbox {
      width: 16px; height: 16px;
      accent-color: #7c3aed;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .todo-main {
      flex: 1;
      min-width: 0;
    }
    .todo-text {
      font-size: 12px;
      color: #ddd;
      line-height: 1.4;
      word-break: break-word;
    }
    .todo-meta {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }
    .todo-detail {
      margin-top: 8px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      display: none;
    }
    .todo-detail.open { display: block; }
    .todo-detail-chat {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .todo-detail-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #f0f0f0;
      padding: 6px 10px;
      font-size: 11px;
      font-family: inherit;
    }
    .todo-detail-input:focus { outline: none; border-color: #533483; }
    .todo-detail-send {
      background: #533483;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 11px;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .todo-detail-send:hover { background: #6d28d9; }

    /* ── プランカード ── */
    .plan-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .plan-card {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px;
    }
    .plan-card-label {
      font-size: 10px;
      color: #666;
      margin-bottom: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .plan-card-value {
      font-size: 12px;
      color: #ddd;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .plan-script-wrap {
      margin-top: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .plan-script-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 11px;
      color: #a78bfa;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .plan-script-toggle:hover { color: #c4b5fd; }

    /* ── コンシェルジュ ── */
    .concierge-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .concierge-title {
      font-size: 13px;
      font-weight: 700;
      color: #c4b5fd;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chat-messages {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 10px;
      height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .chat-textarea {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #f0f0f0;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 40px;
      max-height: 80px;
      line-height: 1.5;
    }
    .chat-textarea:focus { outline: none; border-color: #533483; }
    .btn-chat-send {
      background: #533483;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-chat-send:hover:not(:disabled) { background: #6d28d9; }
    .btn-chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-thinking {
      display: flex; align-items: center; gap: 4px;
      padding: 6px 10px; border-radius: 10px;
      background: rgba(255,255,255,0.05);
      align-self: flex-start;
    }
    .thinking-dot {
      width: 5px; height: 5px;
      background: #888; border-radius: 50%;
      animation: thinkPulse 1.2s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkPulse {
      0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
      40%          { opacity: 1;   transform: scale(1); }
    }

    /* ── 削除モーダル ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      width: calc(100% - 48px);
      display: flex; flex-direction: column; gap: 12px;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: #eee; }
    .modal-desc  { font-size: 13px; color: #999; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .modal-actions button {
      flex: 1; padding: 10px; border-radius: 8px;
      border: none; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-modal-cancel { background: rgba(255,255,255,0.1); color: #ccc; }
    .btn-modal-cancel:hover { background: rgba(255,255,255,0.15); }
    .btn-modal-delete { background: #e94560; color: #fff; }
    .btn-modal-delete:hover { background: #c0392b; }

    /* ── 謝罪完了モーダル ── */
    .complete-modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .complete-modal-overlay.visible { display: flex; }
    .complete-modal-box {
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px;
      max-width: 340px;
      width: calc(100% - 48px);
      display: flex; flex-direction: column; gap: 14px;
    }
    .complete-modal-title { font-size: 16px; font-weight: 700; color: #eee; }
    .complete-modal-label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .outcome-row { display: flex; gap: 8px; }
    .outcome-btn {
      flex: 1; padding: 10px 4px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05); color: #ccc;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.2s; text-align: center;
    }
    .outcome-btn:hover { border-color: #7c3aed; color: #c4b5fd; }
    .outcome-btn.selected { border-color: #7c3aed; background: rgba(124,58,237,0.2); color: #c4b5fd; }
    .complete-notes {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: #f0f0f0; padding: 8px 10px;
      font-size: 12px; font-family: inherit; resize: vertical; min-height: 60px;
    }
    .complete-notes:focus { outline: none; border-color: #533483; }
    .complete-modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .complete-modal-actions button {
      flex: 1; padding: 10px; border-radius: 8px;
      border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-complete-cancel { background: rgba(255,255,255,0.1); color: #ccc; }
    .btn-complete-cancel:hover { background: rgba(255,255,255,0.15); }
    .btn-complete-submit { background: #2ecc71; color: #fff; }
    .btn-complete-submit:hover:not(:disabled) { background: #27ae60; }
    .btn-complete-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .complete-modal-error {
      font-size: 12px; color: #e94560; display: none;
    }
    .apology-complete-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      background: rgba(46,204,113,0.12); color: #2ecc71;
      border: 1px solid rgba(46,204,113,0.2);
    }
    .btn-complete {
      width: 100%; padding: 12px;
      border-radius: 12px; border: 1px solid rgba(46,204,113,0.4);
      background: rgba(46,204,113,0.08); color: #2ecc71;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-complete:hover { background: rgba(46,204,113,0.15); }
  </style>
</head>
<body>
  <div id="global-banner" class="global-banner" role="alert" aria-live="assertive"></div>

  <div class="app-container">
    <!-- ヘッダー -->
    <header class="app-header" data-testid="app-header">
      <button id="back-btn" class="app-header-logout" type="button"
        style="left:16px; right:auto;" aria-label="戻る">← 戻る</button>
      <div class="app-header-brand">
        <img src="../icons/geza_icon.png" alt="GEZA" class="app-header-icon" />
        <span class="app-header-title">GEZA</span>
      </div>
      <button id="logout-btn" class="app-header-logout" type="button"
        data-testid="logout-btn">ログアウト</button>
    </header>

    <!-- メインコンテンツ -->
    <main id="detail-main" style="overflow-y:auto; flex:1;">
      <div class="detail-wrap">

        <!-- ① ボスアバター + 相手情報 -->
        <div class="case-hero" id="case-hero">
          <div class="case-avatar-wrap">
            <div class="avatar-frame">
              <div id="case-boss-avatar" class="facesjs-container"
                role="img" aria-label="案件ボスアバター"></div>
            </div>
          </div>
          <div class="case-meta">
            <div class="case-meta-title" id="case-title">読み込み中...</div>
            <div class="badge-row" id="case-badges"></div>
            <div class="case-meta-summary" id="case-summary"></div>
          </div>
        </div>

        <!-- ② アクションボタン（リハーサル＋完了＋削除） -->
        <div class="action-row">
          <button class="btn-action rehearsal" id="btn-rehearsal" type="button">
            🎙️ リハーサル
          </button>
          <button class="btn-action" id="btn-complete" type="button" style="display:none;border-color:rgba(46,204,113,0.4);color:#2ecc71;">
            ✅ 謝罪完了
          </button>
          <button class="btn-action delete" id="btn-delete" type="button">
            🗑️ 削除
          </button>
        </div>

        <!-- フォローメール・再発防止ボタン -->
        <div style="margin-top:10px; text-align:center;">
          <button id="btn-follow-mail" type="button"
            style="background:rgba(100,180,255,0.12);border:1px solid rgba(100,180,255,0.35);color:#7ecfff;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer;width:100%;font-weight:600;">
            📋 再発防止策・フォローメールを準備する
          </button>
        </div>

        <!-- メール対応ボタン -->
        <div style="margin-top:10px; text-align:center;">
          <button id="btn-mail-thread" type="button"
            style="background:rgba(255,180,50,0.10);border:1px solid rgba(255,180,50,0.35);color:#d4a853;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer;width:100%;font-weight:600;">
            ✉️ メール対応（受信→AI返信→スレッド管理）
          </button>
          <div id="mail-thread-badge" style="display:none; font-size:11px; color:#888; margin-top:4px;"></div>
        </div>

        <!-- 完了済みバッジ -->
        <div id="complete-badge-wrap" style="display:none;">
          <div class="apology-complete-badge">✅ 謝罪完了済み</div>
        </div>

        <!-- ③ タイムライン表示 -->
        <div class="timeline" id="case-timeline">
          <!-- 謝罪プラン -->
          <div class="timeline-item" data-section="plan">
            <div class="timeline-rail">
              <div class="timeline-dot done"></div>
              <div class="timeline-line"></div>
            </div>
            <div class="timeline-content">
              <div class="timeline-header" data-toggle="plan-body">
                <span class="timeline-label">📋 謝罪プラン</span>
                <span class="timeline-expand-icon">▼</span>
              </div>
              <div class="timeline-body" id="plan-body">
                <div class="plan-grid">
                  <div class="plan-card">
                    <div class="plan-card-label">第一声</div>
                    <div class="plan-card-value" id="plan-first-words"></div>
                  </div>
                  <div class="plan-card">
                    <div class="plan-card-label">タイミング</div>
                    <div class="plan-card-value" id="plan-timing"></div>
                  </div>
                  <div class="plan-card">
                    <div class="plan-card-label">手土産</div>
                    <div class="plan-card-value" id="plan-gift"></div>
                  </div>
                </div>
                <div style="margin-top:8px;">
                  <button class="plan-script-toggle" id="btn-toggle-script" type="button">
                    ▶ 謝罪台本全文を見る
                  </button>
                  <div id="plan-full-script-wrap" class="plan-script-wrap" style="display:none;">
                    <div class="plan-card-label">全セリフ台本</div>
                    <div class="plan-card-value" id="plan-full-script"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Todoリスト -->
          <div class="timeline-item" data-section="todo">
            <div class="timeline-rail">
              <div class="timeline-dot active" id="todo-dot"></div>
              <div class="timeline-line"></div>
            </div>
            <div class="timeline-content">
              <div class="timeline-header" data-toggle="todo-body">
                <span class="timeline-label">📝 やることリスト</span>
                <span style="font-size:10px;color:#666;" id="todo-progress"></span>
                <span class="timeline-expand-icon">▼</span>
              </div>
              <div class="timeline-body" id="todo-body">
                <div id="todo-list" class="todo-list"></div>
              </div>
            </div>
          </div>

          <!-- コンシェルジュ -->
          <div class="timeline-item" data-section="concierge">
            <div class="timeline-rail">
              <div class="timeline-dot active"></div>
            </div>
            <div class="timeline-content">
              <div class="concierge-section">
                <div class="concierge-title">
                  <img src="../icons/geza_icon.png" alt="GEZA" style="width:18px;height:18px;border-radius:4px;" />
                  GEZAコンシェルジュ
                  <span style="margin-left:auto;font-size:10px;color:#555;" id="chat-turn-label"></span>
                </div>
                <div id="chat-messages" class="chat-messages"
                  role="log" aria-live="polite" aria-label="チャット履歴"></div>
                <div class="chat-input-row">
                  <textarea id="chat-input" class="chat-textarea"
                    placeholder="Todoの進め方やプランの相談など…"
                    rows="1" maxlength="500" aria-label="メッセージを入力"></textarea>
                  <button id="btn-chat-send" class="btn-chat-send" type="button">
                    <span id="send-label">送信</span>
                    <span class="loading-spinner" id="send-spinner"
                      style="display:none;" aria-hidden="true"></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- 削除確認モーダル -->
  <div id="delete-modal" class="modal-overlay" role="dialog"
    aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal-box">
      <p class="modal-title" id="modal-title-text">案件を削除しますか？</p>
      <p class="modal-desc">この操作は取り消せません。ダッシュボードに戻ります。</p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="btn-modal-cancel">キャンセル</button>
        <button class="btn-modal-delete" id="btn-modal-delete">削除する</button>
      </div>
    </div>
  </div>

  <!-- 謝罪完了モーダル -->
  <div id="complete-modal" class="complete-modal-overlay" role="dialog"
    aria-modal="true" aria-labelledby="complete-modal-title">
    <div class="complete-modal-box">
      <p class="complete-modal-title" id="complete-modal-title">✅ 謝罪完了を記録する</p>
      <div>
        <div class="complete-modal-label">結果を選択してください</div>
        <div class="outcome-row">
          <button class="outcome-btn" data-outcome="success">😊<br>成功</button>
          <button class="outcome-btn" data-outcome="partial">😐<br>部分的</button>
          <button class="outcome-btn" data-outcome="failed">😞<br>失敗</button>
        </div>
      </div>
      <div>
        <div class="complete-modal-label">メモ（任意・500文字以内）</div>
        <textarea class="complete-notes" id="complete-notes"
          placeholder="実際の謝罪でどうだったか記録しておきましょう…"
          maxlength="500" aria-label="謝罪完了メモ"></textarea>
      </div>
      <div id="complete-modal-error" class="complete-modal-error"></div>
      <div class="complete-modal-actions">
        <button class="btn-complete-cancel" id="btn-complete-cancel" type="button">キャンセル</button>
        <button class="btn-complete-submit" id="btn-complete-submit" type="button" disabled>記録する</button>
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../assets/facesjs.min.js"></script>
  <script src="../shared/state.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/api.js"></script>
  <script src="../shared/avatar-animator.js"></script>
  <script src="case-detail.js"></script>
</body>
</html>
