<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEZA — リハーサルモード</title>
  <link rel="icon" href="../icons/favicon.png">
  <link rel="stylesheet" href="../style.css">
  <style>
    .practice-layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg, #1a1a2e);
      color: var(--text, #e0e0e0);
    }
    .practice-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(0,0,0,.4);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .practice-header h1 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      color: #e0d4f7;
    }
    .btn-end {
      background: transparent;
      border: 1px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.7);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
    }
    .btn-end:hover { border-color: #e74c3c; color: #e74c3c; }

    /* アバターエリア（TOP画面と同じ avatar-frame large 方式を使用） */
    .avatar-section {
      padding: 12px 24px 8px;
    }

    /* ゲージエリア */
    .gauge-area {
      display: flex;
      gap: 20px;
      justify-content: center;
      padding: 0 20px 12px;
      flex-wrap: wrap;
    }
    .gauge-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 140px;
    }
    .gauge-label {
      font-size: .72rem;
      color: rgba(255,255,255,.55);
      display: flex;
      justify-content: space-between;
      width: 100%;
    }
    .gauge-bar-bg {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .gauge-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .5s ease;
    }
    .gauge-anger .gauge-bar-fill { background: linear-gradient(90deg, #f39c12, #e74c3c); }
    .gauge-trust .gauge-bar-fill { background: linear-gradient(90deg, #27ae60, #2ecc71); }

    /* クリティカル謝罪エフェクト */
    @keyframes criticalBarPulse {
      0%   { filter: brightness(1); box-shadow: none; }
      25%  { filter: brightness(2.5) saturate(2); box-shadow: 0 0 18px 4px rgba(46,204,113,.8); }
      60%  { filter: brightness(1.4) saturate(1.5); box-shadow: 0 0 8px 2px rgba(46,204,113,.4); }
      100% { filter: brightness(1); box-shadow: none; }
    }
    .anger-bar-critical {
      animation: criticalBarPulse 0.9s ease-out forwards !important;
      transition: none !important;
    }
    /* 画面フラッシュオーバーレイ */
    #critical-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      background: radial-gradient(ellipse at center, rgba(46,204,113,.35) 0%, transparent 70%);
      opacity: 0;
    }
    #critical-flash.active {
      animation: flashFade 0.7s ease-out forwards;
    }
    @keyframes flashFade {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    .gauge-meta {
      font-size: .7rem;
      color: rgba(255,255,255,.4);
    }

    /* チャットエリア */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 260px;
    }
    .chat-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: .88rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: #2a2a5e;
      border-bottom-right-radius: 3px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,.07);
      border-bottom-left-radius: 3px;
    }
    .chat-bubble.fallback {
      opacity: .6;
      font-style: italic;
    }
    .ng-word-highlight {
      background: rgba(231,76,60,.2);
      border: 1px solid rgba(231,76,60,.4);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: .8rem;
      margin-top: 4px;
    }
    .follow-up {
      font-size: .82rem;
      color: #f39c12;
      margin-top: 4px;
    }

    /* 入力エリア */
    .input-area {
      padding: 12px 16px 16px;
      background: rgba(0,0,0,.2);
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #apology-input {
      flex: 1;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px 12px;
      font-size: .88rem;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
    }
    #apology-input:focus { outline: none; border-color: #7c6fe0; }
    #apology-input::placeholder { color: rgba(255,255,255,.3); }
    .btn-mic {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background .2s;
      /* スマホタップ時のサイズを指定しタップエリアを拡大 */
      min-width: 48px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-mic:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-mic.recording {
      background: rgba(231,76,60,.25);
      border-color: #e74c3c;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:.5; }
    }
    .btn-submit {
      background: #7c6fe0;
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 10px 18px;
      cursor: pointer;
      font-size: .88rem;
      font-weight: 600;
      transition: background .2s;
    }
    .btn-submit:hover:not(:disabled) { background: #6c5ec8; }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; }
    .mic-label {
      font-size: .7rem;
      color: rgba(255,255,255,.4);
      text-align: center;
      margin-top: 4px;
    }

    /* エラーバナー */
    .error-banner {
      margin: 8px 16px;
      padding: 10px 14px;
      background: rgba(231,76,60,.15);
      border: 1px solid rgba(231,76,60,.4);
      border-radius: 8px;
      font-size: .83rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .btn-retry {
      background: rgba(231,76,60,.3);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 4px 12px;
      cursor: pointer;
      font-size: .8rem;
      white-space: nowrap;
    }

    /* クリアオーバーレイ */
    .clear-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    .clear-overlay h2 {
      font-size: 1.6rem;
      color: #2ecc71;
      text-align: center;
    }
    .btn-to-feedback {
      background: #2ecc71;
      border: none;
      border-radius: 8px;
      color: #111;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* 開始前オーバーレイ */
    .start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 90;
    }
    .start-overlay p {
      color: rgba(255,255,255,.7);
      font-size: .9rem;
      text-align: center;
      padding: 0 20px;
    }
    .btn-start {
      background: #7c6fe0;
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* ターン上限バナー */
    .max-turn-banner {
      margin: 8px 16px;
      padding: 10px 14px;
      background: rgba(243,156,18,.12);
      border: 1px solid rgba(243,156,18,.35);
      border-radius: 8px;
      font-size: .83rem;
      color: #f39c12;
    }
    /* hidden 属性を CSS display より優先させる（CSS display:flex が hidden を上書きするのを防ぐ） */
    [hidden] { display: none !important; }
  </style>
</head>
<body>
<!-- クリティカル謝罪フラッシュオーバーレイ -->
<div id="critical-flash"></div>

<div class="practice-layout">

  <!-- ヘッダー -->
  <header class="practice-header">
    <h1>🎙️ リハーサルモード</h1>
    <button class="btn-end" id="btn-end">練習を終了する</button>
  </header>

  <!-- アバターエリア（TOP画面と同じ構造） -->
  <div class="avatar-section">
    <div class="avatar-frame large">
      <div id="practice-avatar-container" class="facesjs-container" role="img" aria-label="上司アバター"></div>
    </div>
  </div>

  <!-- ゲージエリア -->
  <div class="gauge-area">
    <div class="gauge-item gauge-anger">
      <div class="gauge-label"><span>😤 怒り度</span><span id="anger-value">--</span></div>
      <div class="gauge-bar-bg"><div class="gauge-bar-fill" id="anger-bar" style="width:0%"></div></div>
    </div>
    <div class="gauge-item gauge-trust">
      <div class="gauge-label"><span>🤝 信頼度</span><span id="trust-value">--</span></div>
      <div class="gauge-bar-bg"><div class="gauge-bar-fill" id="trust-bar" style="width:0%"></div></div>
    </div>
    <div class="gauge-meta" id="gauge-meta">ターン: 0 / NG: 0件</div>
  </div>

  <!-- エラーバナー（hidden） -->
  <div class="error-banner" id="error-banner" hidden>
    <span id="error-message">通信エラーが発生しています。少し時間をおいてから再試行してください。</span>
    <button class="btn-retry" id="btn-retry">もう一度試す</button>
  </div>

  <!-- ターン上限バナー（hidden） -->
  <div class="max-turn-banner" id="max-turn-banner" hidden>
    セッションが長くなりました。フィードバックを確認しましょう。
  </div>

  <!-- チャットエリア -->
  <div class="chat-area" id="chat-area"></div>

  <!-- 入力エリア -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="apology-input" placeholder="謝罪の言葉を入力..." rows="2" disabled></textarea>
      <button class="btn-mic" id="btn-mic" disabled title="音声入力">🎤</button>
      <button class="btn-submit" id="btn-submit" disabled>送信</button>
    </div>
    <div class="mic-label" id="mic-label"></div>
  </div>

</div>

<!-- 開始前オーバーレイ -->
<div class="start-overlay" id="start-overlay">
  <p id="start-opponent-desc">相手の情報を読み込み中...</p>
  <button class="btn-start" id="btn-start">練習を始める</button>
</div>

<!-- クリアオーバーレイ（hidden） -->
<div class="clear-overlay" id="clear-overlay" hidden>
  <h2>🎉 クリア！<br>信頼度が回復しました</h2>
  <button class="btn-to-feedback" id="btn-to-feedback">フィードバックを見る</button>
</div>

<!-- スクリプト -->
<script src="../config.js"></script>
<script src="../assets/facesjs.min.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/avatar.js"></script>
<script src="../shared/avatar-animator.js"></script>
<script src="../shared/transcribe.js"></script>
<script src="../shared/polly-sync.js"></script>
<script src="practice.js"></script>
</body>
</html>
